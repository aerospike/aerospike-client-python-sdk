name: CI Build & Test

on:
  pull_request:
    branches:
      - dev
      - stage
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      # Pre-release alpha window: PSDK pins to a PAC version that hasn't
      # been published to PyPI yet. Build PAC from source as a sibling so
      # `pip install .` for the SDK finds the dependency already satisfied
      # and doesn't go to PyPI. Switch back to a plain PyPI install once
      # the matching PAC release lands on PyPI.
      - name: Checkout PAC source (sibling)
        uses: actions/checkout@v4
        with:
          repository: aerospike/aerospike-client-python-async
          ref: v0.4.0-alpha.2-rc1
          path: aerospike-client-python-async

      - name: Setup Rust toolchain (for PAC build)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Build & install PAC from source
        working-directory: aerospike-client-python-async
        run: |
          # `maturin develop` requires an active virtualenv; GitHub-hosted
          # runners use the system Python without one. Build a wheel and
          # `pip install` it instead — same end state, no venv required.
          pip install maturin
          maturin build --release --out dist
          pip install dist/aerospike_async-*.whl

      - name: Install SDK and dev dependencies
        run: |
          pip install -r requirements-dev.txt
          # PAC was installed from the source checkout above. Avoid resolving
          # the temporary direct git dependency during this pre-release window.
          pip install . --no-deps

      - name: Generate ANTLR parser
        run: make generate-ael

      - name: Run unit tests
        run: python -m pytest tests/unit -v

  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      # Pre-release alpha window: PSDK pins to a PAC version that hasn't
      # been published to PyPI yet. Build PAC from source as a sibling so
      # `pip install .` for the SDK finds the dependency already satisfied
      # and doesn't go to PyPI. Switch back to a plain PyPI install once
      # the matching PAC release lands on PyPI.
      - name: Checkout PAC source (sibling)
        uses: actions/checkout@v4
        with:
          repository: aerospike/aerospike-client-python-async
          ref: v0.4.0-alpha.2-rc1
          path: aerospike-client-python-async

      - name: Setup Rust toolchain (for PAC build)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Start Aerospike server
        run: |
          # Server image must be >= 8.1.1 so path-expression / ops-projection
          # tests run instead of skipping. 8.1.2+ unlocks the additional
          # native-ExpOp coverage that consumes ``client_with_cdt_data_812``
          # / ``client_812``; tests that need 8.1.2 and don't see an
          # 8.1.2-routing seed (``AEROSPIKE_HOST_8_1_2``) will skip cleanly.
          docker run -d -p 3000:3000 --name aerospike-server aerospike/aerospike-server:8.1.2.1
          for i in {1..10}; do
            if docker exec aerospike-server asinfo -v "statistics" > /dev/null 2>&1; then
              echo "Aerospike server is ready after $i seconds"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "Aerospike server failed to start after 10 seconds"
              docker logs aerospike-server
              exit 1
            fi
            echo "Waiting for Aerospike server... ($i/10)"
            sleep 1
          done
          echo "Configuring namespace for TTL support..."
          docker exec aerospike-server asinfo -v "set-config:context=namespace;id=test;nsup-period=120"
          docker exec aerospike-server asinfo -v "set-config:context=namespace;id=test;default-ttl=2592000"
          echo "=== Server Build ==="
          docker exec aerospike-server asinfo -v "build"

      - name: Build & install PAC from source
        working-directory: aerospike-client-python-async
        run: |
          # `maturin develop` requires an active virtualenv; GitHub-hosted
          # runners use the system Python without one. Build a wheel and
          # `pip install` it instead — same end state, no venv required.
          pip install maturin
          maturin build --release --out dist
          pip install dist/aerospike_async-*.whl

      - name: Install SDK and dev dependencies
        run: |
          pip install -r requirements-dev.txt
          # PAC was installed from the source checkout above. Avoid resolving
          # the temporary direct git dependency during this pre-release window.
          pip install . --no-deps

      - name: Generate ANTLR parser
        run: make generate-ael

      - name: Run integration tests
        env:
          AEROSPIKE_HOST: localhost:3000
          AEROSPIKE_USE_SERVICES_ALTERNATE: "true"
        run: |
          rm -f aerospike.env
          python -m pytest tests/integration -v || TEST_FAILED=true
          if [ "$TEST_FAILED" = "true" ]; then
            echo "=== Aerospike Server Log (last 100 lines) ==="
            docker logs --tail 100 aerospike-server
            echo "=== End of Server Log ==="
            exit 1
          fi
