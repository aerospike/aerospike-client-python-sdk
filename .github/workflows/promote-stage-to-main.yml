# SKELETON — not yet wired into the live release pipeline.
#
# Implements Gate 3 (STAGE → PROD, owner: Product) of the new release
# pipeline. Mirrors `promote-dev-to-stage.yml` one hop further, plus
# tag and draft-release jobs.
#
# Promotion model:
#   1. A release manager (admin) manually fast-forwards `main` to `stage`'s
#      tip from their local machine:
#          git fetch origin
#          git push origin origin/stage:main     # FF-only push
#   2. That push triggers this workflow on `branch: main`.
#   3. This workflow:
#        - verifies the new main tip is reachable from origin/stage,
#        - promotes the JFrog Release Bundle v2 from STAGE-tier to
#          PROD-tier via the shared-workflows promote-release-bundle
#          composite action,
#        - creates a `v<version>` tag on main,
#        - drafts a GitHub Release pointing at the tag.
#
# Side-effect of PROD-tier landing: the JFrog webhook fires
# `citrusleaf/artifact-publisher/publish-artifact.yaml` with the bundle
# name + version. That workflow's `publish-pypi-artifacts` job runs
# `pypa/gh-action-pypi-publish` against PyPI using Trusted Publishers,
# completing Gate 4 PyPI publishing automatically. RTD remains a
# separate per-repo dispatch (`publish-rtd.yml`).
#
# As with promote-dev-to-stage.yml, this workflow does NOT perform any
# branch-promoting git pushes — the human did that already at step 1.
# Tag pushes and release drafts use the default GITHUB_TOKEN; main does
# not (and must not) be force-pushed by this workflow.
#
# Status: skeleton. Will not promote anything until `vars.JFROG_PROJECT`
# is set. When it is unset the bundle-promote step logs and exits 0
# instead of failing every release. The target JFrog repo and bundle
# signing key are handled internally by the shared-workflows
# `promote-release-bundle` composite action; this caller only supplies
# `environment: PROD` and the JFrog project key.

name: Promote stage → main (Gate 3)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry-run (skip bundle promotion, tag push, and release draft)"
        type: boolean
        default: true

permissions:
  contents: write   # tag push + draft GH release
  id-token: write   # OIDC for JFrog

jobs:
  verify-ancestry:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify main tip is reachable from stage
        run: |
          git fetch origin stage
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/stage; then
            echo "::error::main tip $GITHUB_SHA is not reachable from origin/stage."
            echo "  stage tip: $(git rev-parse origin/stage)"
            echo "  main tip:  $GITHUB_SHA"
            echo "Refusing to promote a non-fast-forward main tip."
            exit 1
          fi
          echo "main tip $GITHUB_SHA is an ancestor of origin/stage — OK to promote."

  extract-version:
    needs: verify-ancestry
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: extract
        run: |
          VERSION="$(./bin/get-version)"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "Promoting version: ${VERSION} (tag: ${TAG})"

  promote-bundle:
    needs: [verify-ancestry, extract-version]
    runs-on: ubuntu-22.04
    steps:
      - name: Skip if JFrog not provisioned (skeleton phase)
        id: gate
        run: |
          if [[ -z "${{ vars.JFROG_PROJECT }}" ]]; then
            echo "JFROG_PROJECT unset — skeleton phase, skipping promotion."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Harden the runner
        if: steps.gate.outputs.skip != 'true'
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Set up JFrog CLI
        if: steps.gate.outputs.skip != 'true'
        uses: step-security/setup-jfrog-cli@893a92f96c7727242adf0e603c77b1f2a22390e1 # v4.9.1
        env:
          JF_URL: https://artifact.aerospike.io
          JF_PROJECT: ${{ vars.JFROG_PROJECT }}
        with:
          oidc-provider-name: ${{ vars.OIDC_PROVIDER_NAME || 'gh-aerospike' }}
          oidc-audience: ${{ vars.OIDC_AUDIENCE || 'aerospike' }}

      - name: Dry-run summary
        if: steps.gate.outputs.skip != 'true' && (inputs.dry-run || 'false') == 'true'
        env:
          BUNDLE_VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          echo "DRY-RUN: would promote bundle —"
          echo "  bundle-name: aerospike-client-python-sdk"
          echo "  version:     $BUNDLE_VERSION"
          echo "  environment: PROD"
          echo "  jf-project:  ${{ vars.JFROG_PROJECT }}"

      - name: Promote Release Bundle v2 (STAGE → PROD)
        if: steps.gate.outputs.skip != 'true' && (inputs.dry-run || 'false') != 'true'
        uses: aerospike/shared-workflows/.github/actions/promote-release-bundle@07c958ca4c5cea494dc8790949c08e3fb28c55e1 # v3.3.0
        with:
          bundle-name: aerospike-client-python-sdk
          version: ${{ needs.extract-version.outputs.version }}
          environment: PROD
          jf-project: ${{ vars.JFROG_PROJECT }}

  tag-main:
    needs: [verify-ancestry, extract-version, promote-bundle]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          TAG: ${{ needs.extract-version.outputs.tag }}
          DRY_RUN: ${{ inputs.dry-run || 'false' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists — skipping tag push."
            exit 0
          fi
          git tag -a "$TAG" -m "Release $TAG"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY-RUN: would run —"
            echo "  git push origin $TAG"
            exit 0
          fi
          git push origin "$TAG"

  draft-github-release:
    needs: [extract-version, promote-bundle, tag-main]
    runs-on: ubuntu-22.04
    steps:
      - name: Draft GitHub release
        if: ${{ (inputs.dry-run || 'false') != 'true' }}
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.0.4
        with:
          tag_name: ${{ needs.extract-version.outputs.tag }}
          name: ${{ needs.extract-version.outputs.tag }}
          draft: true
          generate_release_notes: true

      - name: Dry-run summary
        if: ${{ (inputs.dry-run || 'false') == 'true' }}
        env:
          TAG: ${{ needs.extract-version.outputs.tag }}
        run: |
          echo "DRY-RUN: would draft GitHub release for tag $TAG"
