# NOTE: This workflow will be retired once the new release pipeline lands
# (CI-driven build + branch promotion + publish workflows). Do not extend.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0) — must match pyproject.toml'
        required: true
        type: string
      publish_pypi:
        description: 'Publish to PyPI?'
        required: false
        type: choice
        options:
          - 'no'
          - 'test.pypi.org'
          - 'pypi.org'
        default: 'no'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      pac_version: ${{ steps.pac.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate version matches VERSION file
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $FILE_VERSION"
          if [ "$FILE_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Version mismatch: VERSION file has '$FILE_VERSION' but release requested '${{ inputs.version }}'"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists on remote"
            exit 1
          fi
          echo "Tag v${{ inputs.version }} is available"

      - name: Enforce branch gate
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="${{ github.ref_name }}"
          case "$VERSION" in
            *-alpha.*|*-beta.*)
              if [ "$BRANCH" != "dev" ]; then
                echo "::error::alpha/beta releases must be cut from 'dev' (current: $BRANCH)"
                exit 1
              fi
              echo "alpha/beta release ($VERSION) from $BRANCH — OK"
              ;;
            *-rc.*)
              if [ "$BRANCH" != "stage" ]; then
                echo "::error::RC releases must be cut from 'stage' (current: $BRANCH)"
                exit 1
              fi
              echo "RC release ($VERSION) from $BRANCH — OK"
              ;;
            *)
              if [ "$BRANCH" != "main" ]; then
                echo "::error::Stable releases must be cut from 'main' (current: $BRANCH)"
                exit 1
              fi
              echo "Stable release ($VERSION) from $BRANCH — OK"
              ;;
          esac

      - name: Resolve and validate PAC dependency
        id: pac
        run: |
          PAC_VERSION=$(grep -oE 'aerospike-async==[^"]+' pyproject.toml \
                          | sed 's/aerospike-async==//')
          if [ -z "$PAC_VERSION" ]; then
            echo "::error::Could not extract PAC (aerospike-async==<ver>) from pyproject.toml"
            exit 1
          fi
          echo "PAC dependency version: $PAC_VERSION"
          echo "version=$PAC_VERSION" >> "$GITHUB_OUTPUT"

          echo "Checking PAC release exists on PyPI..."
          if ! curl -fsSL -H 'Accept: application/vnd.pypi.simple.v1+json' \
                 "https://pypi.org/simple/aerospike-async/" \
               | python3 -c "import sys,json; d=json.load(sys.stdin); v='$PAC_VERSION'; sys.exit(0 if v in d.get('versions',[]) else 1)"; then
            echo "::error::PAC version $PAC_VERSION not found on PyPI"
            exit 1
          fi
          echo "PAC release $PAC_VERSION found on PyPI — OK"

  test:
    needs: validate
    uses: ./.github/workflows/build-test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate ANTLR parser
        run: make generate-ael

      - name: Build sdist and wheel
        run: bash scripts/ci/build-artifacts.sh

      - name: Verify wheel contents
        run: |
          python3 -c "
          import zipfile, sys
          whl = list(__import__('pathlib').Path('dist').glob('*.whl'))[0]
          names = zipfile.ZipFile(whl).namelist()
          pkgs = {n.split('/')[0] for n in names if '/' in n}
          print(f'Wheel: {whl.name}')
          print(f'Top-level packages: {sorted(pkgs)}')
          py_files = [n for n in names if n.endswith('.py')]
          print(f'Python files: {len(py_files)}')
          if len(py_files) < 10:
              print('::error::Wheel has suspiciously few Python files')
              sys.exit(1)
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: List release artifacts
        run: ls -lh dist/

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Detect pre-release
        id: prerelease
        run: |
          if echo "${{ inputs.version }}" | grep -qE "\-alpha|\-beta|\-rc"; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Contract: this workflow creates new releases, OR promotes a pre-existing
      # draft (one-time hand-curated notes pattern). Any other pre-existing
      # release at the target tag is an error -- we will not silently clobber
      # a published release.
      - name: Detect existing draft release
        id: draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ inputs.version }}"
          if RELEASE_JSON=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft 2>/dev/null); then
            IS_DRAFT=$(echo "$RELEASE_JSON" | jq -r '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Found existing DRAFT release at $TAG; will promote it as-is and skip auto-generated notes."
            else
              echo "::error::A non-draft release already exists at $TAG. Refusing to overwrite. Delete the release first if you want a fresh one."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No release at $TAG; will auto-generate notes and create fresh."
          fi

      # Auto-generate path: no pre-existing draft, build notes from PRs since last tag.
      - name: Generate release notes (auto)
        if: steps.draft.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_DATE=$(date +"%B %d, %Y")
          TAG="v${{ inputs.version }}"
          API_JSON=$(curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/generate-notes" \
            -d "{\"tag_name\":\"$TAG\"}")
          echo "$API_JSON" | jq -r '.body' | python3 .github/scripts/generate_release_notes.py --date "$RELEASE_DATE" > release_notes.md
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: Create GitHub Release (auto-generated)
        if: steps.draft.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          body_path: release_notes.md
          generate_release_notes: false
          files: dist/*

      # Promote-existing-draft path: leave name + body alone, attach artifacts, flip draft=false.
      - name: Promote existing draft release
        if: steps.draft.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ inputs.version }}"
          gh release upload "$TAG" dist/* --repo "${{ github.repository }}" --clobber
          gh release edit "$TAG" --repo "${{ github.repository }}" \
            --draft=false \
            --prerelease=${{ steps.prerelease.outputs.is_prerelease }}

  publish:
    if: inputs.publish_pypi != 'no'
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.publish_pypi == 'pypi.org' && 'pypi' || 'testpypi' }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install twine
        run: pip install twine

      - name: Publish to Test PyPI
        if: inputs.publish_pypi == 'test.pypi.org'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to PyPI
        if: inputs.publish_pypi == 'pypi.org'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
